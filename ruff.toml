line-length = 121
target-version = "py311"
src = ["**/src", "**/tests"]

[lint]
# TODO - consider enabling more rulesets, e.g. B, C90, N, RET, S, ANN
select = ["E", "F", "I", "W", "UP"]
# Recommended exclusions as per the docs, plus E501 line-too-long
ignore = ["E111", "E114", "E117", "E501", "W191"]
