name: SonarCloud

on:
  push:
    branches:
      - master
  pull_request:
    types: [labeled, opened, synchronize, reopened, unlabeled]
env:
  SCRIPT_FOLDER: ./.github/scripts
  TEST_SCRIPT: ./.github/scripts/run_test.sh

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List .github directory
        run: |
          chmod +x $SCRIPT_FOLDER/*.sh
          echo "Listing .github directory:"
          ls -la ./.github/scripts

      - name: Check Script Path
        run: |
          TEST_SCRIPT=$SCRIPT_FOLDER/run_test.sh
          echo "TEST_SCRIPT is set to: $TEST_SCRIPT"
          if [ -f "$TEST_SCRIPT" ]; then
            echo "Script exists and is executable."
            ls -l "$TEST_SCRIPT"
          else
            echo "Script does NOT exist at $TEST_SCRIPT"
            # show cwd
            echo "Current working directory:"
            pwd
            # list files in cwd
            echo "Files in current directory:"
            ls -la
            echo "Files in .github directory:"
            ls -la ./.github
            echo "Files in .github/scripts directory:"
            ls -la ./.github/scripts
            exit 1
          fi

      - name: Install poetry
        run: pip install poetry==1.8.4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
          cache: 'poetry'

      - name: Set up AWS credentials
        env:
          AWS_ACCESS_KEY_ID: "FOOBARKEY"
          AWS_SECRET_ACCESS_KEY: "FOOBARSECRET"
        run: |
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY

      - name: Run unittest with filenameprocessor-coverage
        working-directory: filenameprocessor
        id: filenameprocessor
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.10 \
          "filenameprocessor" \
          "sonarcloud-coverage-filenameprocessor-coverage.xml"

      - name: Run unittest with recordprocessor-coverage
        working-directory: recordprocessor
        id: recordprocessor
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.10 \
          "recordprocessor" \
          "sonarcloud-coverage-recordprocessor-coverage.xml"

        # This step is redundant - all of these tests will be run in the backend step below
      - name: Run unittest with recordforwarder-coverage
        working-directory: backend
        id: recordforwarder
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.11 \
          "recordforwarder" \
          "sonarcloud-coverage-recordforwarder-coverage.xml"

      - name: Run unittest with coverage-ack-lambda
        working-directory: ack_backend
        id: acklambda
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.10 \
          "ack-lambda" \
          "sonarcloud-coverage-ack-lambda.xml"

      - name: Run unittest with coverage-delta
        working-directory: delta_backend
        id: delta
        env:
            PYTHONPATH: delta_backend/src:delta_backend/tests
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.11 \
          "delta" \
          "sonarcloud-coverage-delta.xml"

      - name: Run unittest with coverage-fhir-api
        working-directory: backend
        id: fhirapi
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.11 \
          "fhir-api" \
          "sonarcloud-coverage-fhir-api.xml"

      - name: Run unittest with coverage-mesh-processor
        working-directory: mesh_processor
        id: meshprocessor
        continue-on-error: true
        run: |
          $TEST_SCRIPT 3.10 \
          "mesh_processor" \
          "sonarcloud-coverage-mesh_processor-coverage.xml"

      - name: Run Test Failure Summary
        id: check_failure
        run: |
          if [ -s failed_tests.txt ]; then
            echo "The following tests failed:"
            cat failed_tests.txt

            while IFS= read -r line; do
              echo "##[error]Test Failures: $line"
            done < failed_tests.txt

            exit 1
          else
            echo "All tests passed."
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
