name: Deploy Backend

on:
  workflow_call:
    inputs:
      apigee_environment:
        required: true
        type: string
      build_recordprocessor_image:
        required: false
        type: boolean
        default: false
      build_ack_backend_image:
        required: false
        type: boolean
        default: false
      lambda_image_overrides:
        description: >
          JSON map of lambda_name -> immutable image selector for reuse mode.
          Supports tags, sha256 digests, or full image URIs. Empty object means
          no explicit override.
        required: false
        type: string
        default: "{}"
      diff_base_sha:
        required: false
        type: string
        default: ""
      diff_head_sha:
        required: false
        type: string
        default: ""
      run_diff_check:
        required: false
        type: boolean
        default: false
      create_mns_subscription:
        required: false
        type: boolean
        default: true
      environment:
        required: true
        type: string
      sub_environment:
        required: true
        type: string
    outputs:
      recordprocessor_image_version:
        description: Selected immutable image URI used for recordprocessor deployment
        value: ${{ jobs.terraform-plan.outputs.recordprocessor_image_uri }}
      ack_backend_image_version:
        description: Selected immutable image URI used for ack backend deployment
        value: ${{ jobs.terraform-plan.outputs.ack_backend_image_uri }}
      image_uris_json:
        description: JSON map of lambda_name -> immutable image URI used for deployment
        value: ${{ jobs.terraform-plan.outputs.image_uris_json }}
  workflow_dispatch:
    inputs:
      apigee_environment:
        type: choice
        description: Select the Apigee proxy environment
        options:
          - internal-dev
          - internal-qa
          - int
          - ref
          - prod
      create_mns_subscription:
        description: Create an MNS Subscription programatically. Only available in AWS dev
        required: false
        type: boolean
        default: true
      environment:
        type: choice
        description: Select the AWS backend environment
        options:
          - dev
          - preprod
          - prod
      build_recordprocessor_image:
        description: Build and publish a new recordprocessor image
        required: true
        type: boolean
        default: true
      build_ack_backend_image:
        description: Build and publish a new ack backend image
        required: true
        type: boolean
        default: true
      lambda_image_overrides:
        description: >
          JSON map of lambda_name -> immutable image selector for reuse mode.
          e.g. {"recordprocessor":"internal-dev-git-abc123","ack-backend":"123456789012.dkr.ecr.eu-west-2.amazonaws.com/imms-ackbackend-repo@sha256:..."}
        required: false
        type: string
        default: "{}"
      diff_base_sha:
        description: Base commit SHA for diff checks
        required: false
        type: string
        default: ""
      diff_head_sha:
        description: Head commit SHA for diff checks
        required: false
        type: string
        default: ""
      run_diff_check:
        description: Enable diff checks to auto-build on code changes
        required: true
        type: boolean
        default: false
      sub_environment:
        type: string
        description: Set the sub environment name e.g. pr-xxx, or green/blue in higher environments

env: # Sonarcloud - do not allow direct usage of untrusted data
  APIGEE_ENVIRONMENT: ${{ inputs.apigee_environment }}
  ENVIRONMENT: ${{ inputs.environment }}
  SUB_ENVIRONMENT: ${{ inputs.sub_environment }}

run-name: Deploy Backend - ${{ inputs.environment }} ${{ inputs.sub_environment }}

jobs:
  deploy-lambda-images:
    name: Deploy ${{ matrix.lambda_name }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda_name: recordprocessor
            ecr_repository: imms-recordprocessor-repo
            dockerfile_path: lambdas/recordprocessor/Dockerfile
            lambda_paths: |
              lambdas/recordprocessor/
          - lambda_name: ack-backend
            ecr_repository: imms-ackbackend-repo
            dockerfile_path: lambdas/ack_backend/Dockerfile
            lambda_paths: |
              lambdas/ack_backend/
    uses: ./.github/workflows/deploy-lambda-artifact.yml
    with:
      lambda_name: ${{ matrix.lambda_name }}
      environment: ${{ inputs.environment }}
      sub_environment: ${{ inputs.sub_environment }}
      build_image: ${{ matrix.lambda_name == 'recordprocessor' && inputs.build_recordprocessor_image || matrix.lambda_name == 'ack-backend' && inputs.build_ack_backend_image || false }}
      image_version: ${{ fromJson(inputs.lambda_image_overrides)[matrix.lambda_name] || '' }}
      run_diff_check: ${{ inputs.run_diff_check }}
      diff_base_sha: ${{ inputs.diff_base_sha }}
      diff_head_sha: ${{ inputs.diff_head_sha }}
      lambda_paths: ${{ matrix.lambda_paths }}
      shared_paths: |
        lambdas/shared/src/common/
      docker_context_path: lambdas
      dockerfile_path: ${{ matrix.dockerfile_path }}
      ecr_repository: ${{ matrix.ecr_repository }}
      image_tag_prefix: ${{ inputs.sub_environment }}-
      allow_implicit_tag_prefix_reuse: ${{ inputs.sub_environment == 'internal-dev' || startsWith(inputs.sub_environment, 'pr-') }}

  terraform-plan:
    permissions:
      id-token: write
      contents: read
    needs:
      - deploy-lambda-images
    if: ${{ !cancelled() }}
    outputs:
      image_uris_json: ${{ steps.lambda-images.outputs.image_uris_json }}
      recordprocessor_image_uri: ${{ steps.lambda-images.outputs.recordprocessor_image_uri }}
      ack_backend_image_uri: ${{ steps.lambda-images.outputs.ack_backend_image_uri }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Connect to AWS
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/auto-ops
          role-session-name: github-actions

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: "1.12.2"

      - name: Download lambda deployment manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: deploy-manifest-*-${{ inputs.environment }}-${{ inputs.sub_environment }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/lambda-manifests
          merge-multiple: true

      - name: Assemble lambda image map and export Terraform vars
        id: lambda-images
        run: |
          set -euo pipefail

          manifest_dir="${RUNNER_TEMP}/lambda-manifests"
          shopt -s nullglob
          manifest_files=("${manifest_dir}"/*.json)

          if [ "${#manifest_files[@]}" -eq 0 ]; then
            echo "No lambda deployment manifests found."
            exit 1
          fi

          image_uris_json="$(
            jq -cs 'map(select(.lambda_name != null and .image_uri != null) | {(.lambda_name): .image_uri}) | add' \
              "${manifest_files[@]}"
          )"

          echo "image_uris_json=${image_uris_json}" >> "$GITHUB_OUTPUT"

          for lambda_name in recordprocessor ack-backend; do
            image_uri="$(jq -er --arg lambda_name "${lambda_name}" '.[$lambda_name]' <<< "${image_uris_json}")"
            echo "${lambda_name//-/_}_image_uri=${image_uri}" >> "$GITHUB_OUTPUT"
          done

          while IFS=$'\t' read -r lambda_name image_uri; do
            lambda_env_key="${lambda_name//-/_}"
            echo "TF_VAR_${lambda_env_key}_image_uri=${image_uri}" >> "$GITHUB_ENV"
          done < <(
            jq -er 'to_entries[] | [.key, .value] | @tsv' <<< "${image_uris_json}"
          )

      - name: Terraform Init
        working-directory: infrastructure/instance
        run: make init

      - name: Terraform Plan
        # Ignore cancellations to prevent Terraform from being killed while it holds a state lock
        # A stuck process can still be killed with the force-cancel API operation
        if: ${{ !failure() }}
        working-directory: infrastructure/instance
        run: make plan-ci

      - name: Save Terraform Plan
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.ENVIRONMENT }}-${{ env.SUB_ENVIRONMENT }}-tfplan
          path: infrastructure/instance/tfplan

  terraform-apply:
    permissions:
      id-token: write
      contents: read
    needs: terraform-plan
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/auto-ops
          role-session-name: github-actions

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: "1.12.2"

      - name: Restore lambda image Terraform vars
        env:
          IMAGE_URIS_JSON: ${{ needs.terraform-plan.outputs.image_uris_json }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_URIS_JSON}" ] || [ "${IMAGE_URIS_JSON}" = "null" ]; then
            echo "terraform-plan did not emit image_uris_json."
            exit 1
          fi

          while IFS=$'\t' read -r lambda_name image_uri; do
            lambda_env_key="${lambda_name//-/_}"
            echo "TF_VAR_${lambda_env_key}_image_uri=${image_uri}" >> "$GITHUB_ENV"
          done < <(
            jq -er 'to_entries[] | [.key, .value] | @tsv' <<< "${IMAGE_URIS_JSON}"
          )

      - name: Retrieve Terraform Plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.ENVIRONMENT }}-${{ env.SUB_ENVIRONMENT }}-tfplan
          path: infrastructure/instance

      - name: Terraform Init
        working-directory: infrastructure/instance
        run: make init

      - name: Terraform Apply
        # Ignore cancellations to prevent Terraform from being killed while it holds a state lock
        # A stuck process can still be killed with the force-cancel API operation
        if: ${{ !failure() }}
        working-directory: infrastructure/instance
        run: |
          make apply-ci
          echo "ID_SYNC_QUEUE_ARN=$(make -s output name=id_sync_queue_arn)" >> $GITHUB_ENV

      - name: Install poetry
        if: ${{ inputs.environment == 'dev' && inputs.create_mns_subscription }}
        run: pip install poetry==2.1.4

      - uses: actions/setup-python@v6.2.0
        if: ${{ inputs.environment == 'dev' && inputs.create_mns_subscription }}
        with:
          python-version: 3.11
          cache: "poetry"
          cache-dependency-path: |
            lambdas/mns_subscription/poetry.lock
            lambdas/shared/poetry.lock

      - name: Create MNS Subscription
        if: ${{ inputs.environment == 'dev' && inputs.create_mns_subscription }}
        working-directory: "./lambdas/mns_subscription"
        env:
          APIGEE_ENVIRONMENT: int
          SQS_ARN: ${{ env.ID_SYNC_QUEUE_ARN }}
        run: |
          poetry install --no-root
          echo "Subscribing SQS to MNS for notifications..."
          make subscribe
